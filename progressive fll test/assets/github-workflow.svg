<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="200" fill="white"/>

  <!-- Title -->
  <text x="200" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">GitHub Workflow</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF9800"/>
    </marker>
  </defs>

  <!-- Step 1: Edit Code -->
  <g>
    <!-- Box -->
    <rect x="20" y="70" width="90" height="70" fill="#2196F3" stroke="#333" stroke-width="2" rx="5"/>

    <!-- Icon (pencil/edit) -->
    <g fill="white">
      <path d="M 50 85 L 70 85 L 70 95 L 50 95 Z"/>
      <path d="M 48 97 L 72 97"/>
      <path d="M 48 101 L 72 101"/>
      <path d="M 48 105 L 72 105"/>
    </g>

    <!-- Label -->
    <text x="65" y="125" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Edit</text>
    <text x="65" y="141" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Code</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="110" y1="105" x2="150" y2="105" stroke="#FF9800" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Commit -->
  <g>
    <!-- Box -->
    <rect x="150" y="70" width="90" height="70" fill="#FF9800" stroke="#333" stroke-width="2" rx="5"/>

    <!-- Icon (checkmark) -->
    <g fill="white" stroke-width="3">
      <path d="M 165 110 L 175 120 L 195 95" stroke="white" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Label -->
    <text x="195" y="125" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Commit</text>
    <text x="195" y="141" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Changes</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="240" y1="105" x2="280" y2="105" stroke="#FF9800" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Push to GitHub -->
  <g>
    <!-- Box -->
    <rect x="280" y="70" width="100" height="70" fill="#4CAF50" stroke="#333" stroke-width="2" rx="5"/>

    <!-- Icon (upload/push) -->
    <g fill="white" stroke-width="2">
      <path d="M 310 115 L 310 95 M 305 100 L 310 95 L 315 100"/>
      <path d="M 300 118 L 320 118"/>
    </g>

    <!-- Label -->
    <text x="330" y="125" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Push to</text>
    <text x="330" y="141" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">GitHub</text>
  </g>

  <!-- Description boxes -->
  <!-- Step 1 description -->
  <rect x="20" y="160" width="90" height="35" fill="#f0f0f0" stroke="#333" stroke-width="1" rx="3"/>
  <text x="65" y="173" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#333">Make your</text>
  <text x="65" y="188" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#333">changes</text>

  <!-- Step 2 description -->
  <rect x="150" y="160" width="90" height="35" fill="#f0f0f0" stroke="#333" stroke-width="1" rx="3"/>
  <text x="195" y="173" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#333">Save</text>
  <text x="195" y="188" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#333">snapshot</text>

  <!-- Step 3 description -->
  <rect x="280" y="160" width="100" height="35" fill="#f0f0f0" stroke="#333" stroke-width="1" rx="3"/>
  <text x="330" y="173" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#333">Share with</text>
  <text x="330" y="188" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="#333">team</text>
</svg>
