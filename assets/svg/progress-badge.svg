<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badgeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0.3" />
    </linearGradient>
    <filter id="badgeShadow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="32" fill="url(#badgeGlow)" opacity="0.3"/>

  <!-- Shield background -->
  <path d="M 32 8 L 48 18 L 48 38 Q 32 52 32 52 Q 16 52 16 38 L 16 18 Z" fill="url(#goldGradient)" filter="url(#badgeShadow)"/>

  <!-- Shield accent lines -->
  <path d="M 32 8 L 48 18 L 48 38 Q 32 52 32 52 Q 16 52 16 38 L 16 18 Z" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity="0.5"/>

  <!-- Central star - large -->
  <g filter="url(#starGlow)">
    <polygon points="32,16 35,24 44,24 37,30 40,38 32,33 24,38 27,30 20,24 29,24" fill="#FEF3C7"/>
  </g>

  <!-- Indigo accent corners on shield -->
  <circle cx="20" cy="22" r="2.5" fill="#6366F1" opacity="0.8"/>
  <circle cx="44" cy="22" r="2.5" fill="#6366F1" opacity="0.8"/>
  <circle cx="32" cy="48" r="2.5" fill="#6366F1" opacity="0.8"/>

  <!-- Smaller accent stars -->
  <polygon points="16,18 17,21 20,21 18,23 19,26 16,24" fill="#6366F1" opacity="0.7"/>
  <polygon points="48,18 49,21 52,21 50,23 51,26 48,24" fill="#22D3EE" opacity="0.7"/>

  <!-- Highlight on shield (metallic effect) -->
  <ellipse cx="28" cy="28" rx="6" ry="8" fill="#FBBF24" opacity="0.3"/>

  <!-- Inner border ring for depth -->
  <path d="M 32 10 L 46 19 L 46 38 Q 32 50 32 50 Q 18 50 18 38 L 18 19 Z" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.6"/>

  <!-- Decorative cyan accent line -->
  <line x1="26" y1="35" x2="38" y2="35" stroke="#22D3EE" stroke-width="1.5" opacity="0.5"/>

  <!-- Small geometric accent triangles -->
  <polygon points="32,50 30,44 34,44" fill="#FEF3C7" opacity="0.4"/>
</svg>