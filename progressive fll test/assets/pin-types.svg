<svg viewBox="0 0 350 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="350" height="280" fill="white"/>

  <!-- Title -->
  <text x="175" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Pin Types</text>

  <!-- Friction Pin (Left) -->
  <g>
    <!-- Head -->
    <circle cx="85" cy="80" r="18" fill="#333" stroke="#333" stroke-width="2"/>

    <!-- Shaft with ridges (friction grooves) -->
    <rect x="80" y="100" width="10" height="80" fill="#333" stroke="#333" stroke-width="2"/>

    <!-- Ridge lines for friction -->
    <line x1="78" y1="110" x2="92" y2="110" stroke="#666" stroke-width="1"/>
    <line x1="78" y1="125" x2="92" y2="125" stroke="#666" stroke-width="1"/>
    <line x1="78" y1="140" x2="92" y2="140" stroke="#666" stroke-width="1"/>
    <line x1="78" y1="155" x2="92" y2="155" stroke="#666" stroke-width="1"/>

    <!-- Labels -->
    <text x="85" y="200" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Friction Pin</text>
    <text x="85" y="220" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#666">Black with ridges</text>
    <text x="85" y="235" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#666">Holds position</text>
  </g>

  <!-- Frictionless Pin (Right) -->
  <g>
    <!-- Head -->
    <circle cx="265" cy="80" r="18" fill="#999" stroke="#333" stroke-width="2"/>

    <!-- Smooth shaft (no ridges) -->
    <rect x="260" y="100" width="10" height="80" fill="#999" stroke="#333" stroke-width="2"/>

    <!-- Smooth surface (no lines, just gradient effect) -->
    <rect x="260" y="100" width="10" height="80" fill="url(#smoothGradient)" opacity="0.3"/>

    <!-- Labels -->
    <text x="265" y="200" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Frictionless Pin</text>
    <text x="265" y="220" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#666">Gray and smooth</text>
    <text x="265" y="235" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#666">Allows rotation</text>
  </g>

  <!-- Comparison box -->
  <rect x="30" y="250" width="290" height="22" fill="#f0f0f0" stroke="#333" stroke-width="2" rx="3"/>
  <text x="175" y="267" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Choose based on whether parts need to rotate or stay fixed</text>

  <!-- Definitions for gradient effect -->
  <defs>
    <linearGradient id="smoothGradient" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" style="stop-color:#999;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccc;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
