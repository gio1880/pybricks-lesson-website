<svg viewBox="0 0 350 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="350" height="300" fill="white"/>

  <!-- Distance sensor (left side) -->
  <rect x="20" y="100" width="70" height="100" fill="#666" stroke="#333" stroke-width="3" rx="5"/>

  <!-- Sensor transducer circles -->
  <circle cx="42" cy="130" r="10" fill="#2196F3" stroke="#333" stroke-width="2"/>
  <circle cx="64" cy="130" r="10" fill="#2196F3" stroke="#333" stroke-width="2"/>
  <circle cx="42" cy="170" r="10" fill="#2196F3" stroke="#333" stroke-width="2"/>
  <circle cx="64" cy="170" r="10" fill="#2196F3" stroke="#333" stroke-width="2"/>

  <!-- Port connection -->
  <rect x="30" y="210" width="50" height="18" fill="#FF9800" stroke="#333" stroke-width="2" rx="3"/>

  <!-- Ultrasonic waves radiating -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF9800"/>
    </marker>
  </defs>

  <!-- Wave rays -->
  <line x1="90" y1="110" x2="200" y2="90" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="4,4"/>
  <line x1="90" y1="130" x2="230" y2="130" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="4,4"/>
  <line x1="90" y1="150" x2="200" y2="150" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="4,4"/>
  <line x1="90" y1="170" x2="230" y2="170" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="4,4"/>
  <line x1="90" y1="190" x2="200" y2="210" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="4,4"/>

  <!-- Object being detected -->
  <rect x="210" y="80" width="60" height="140" fill="#4CAF50" stroke="#333" stroke-width="3" rx="5"/>
  <text x="240" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Object</text>

  <!-- Distance labels -->
  <text x="160" y="50" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#666">Distance</text>

  <!-- Title -->
  <text x="55" y="260" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#333">Ultrasonic Distance Sensor</text>

  <!-- Range indicator -->
  <text x="280" y="260" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#666">~200cm range</text>
</svg>
