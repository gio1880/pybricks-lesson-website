<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pythonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <filter id="pythonGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle background -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.3"/>

  <!-- Main snake body - geometric style -->
  <!-- Head (left side) -->
  <ellipse cx="16" cy="20" rx="8" ry="10" fill="url(#pythonGradient)" filter="url(#pythonGlow)"/>

  <!-- Eye -->
  <circle cx="14" cy="18" r="2" fill="#22D3EE"/>

  <!-- Upper body curve -->
  <path d="M 20 18 Q 28 15 32 20 Q 35 24 32 30" stroke="url(#pythonGradient)" stroke-width="7" fill="none" stroke-linecap="round" filter="url(#pythonGlow)"/>

  <!-- Middle section -->
  <path d="M 32 30 Q 35 36 30 40 Q 25 42 22 38" stroke="url(#pythonGradient)" stroke-width="6.5" fill="none" stroke-linecap="round" filter="url(#pythonGlow)"/>

  <!-- Lower body curve right -->
  <path d="M 22 38 Q 20 42 25 45 Q 32 48 36 44" stroke="url(#pythonGradient)" stroke-width="6.5" fill="none" stroke-linecap="round" filter="url(#pythonGlow)"/>

  <!-- Tail coil (right side) -->
  <path d="M 36 44 Q 40 42 42 48 Q 42 54 36 54 Q 32 54 32 50" stroke="url(#pythonGradient)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#pythonGlow)"/>

  <!-- Accent nodes along body -->
  <circle cx="24" cy="22" r="1.5" fill="#22D3EE" opacity="0.7"/>
  <circle cx="30" cy="28" r="1.5" fill="#22D3EE" opacity="0.7"/>
  <circle cx="26" cy="40" r="1.5" fill="#22D3EE" opacity="0.7"/>
  <circle cx="34" cy="46" r="1.5" fill="#22D3EE" opacity="0.7"/>

  <!-- Subtle geometric accent behind head -->
  <polygon points="10,12 22,8 20,26" fill="#22D3EE" opacity="0.15"/>

  <!-- Subtle accent at tail -->
  <polygon points="48,44 44,58 36,52" fill="#22D3EE" opacity="0.15"/>
</svg>