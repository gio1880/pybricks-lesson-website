<svg viewBox="0 0 300 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="350" fill="white"/>

  <!-- Title -->
  <text x="150" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Robot Base - Top View</text>

  <!-- Chassis frame (rectangular) -->
  <rect x="50" y="60" width="200" height="240" fill="#e0e0e0" stroke="#333" stroke-width="3" rx="10"/>

  <!-- Left wheel -->
  <circle cx="60" cy="100" r="25" fill="#2196F3" stroke="#333" stroke-width="3"/>
  <circle cx="60" cy="100" r="20" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Right wheel -->
  <circle cx="240" cy="100" r="25" fill="#2196F3" stroke="#333" stroke-width="3"/>
  <circle cx="240" cy="100" r="20" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Back left wheel -->
  <circle cx="60" cy="280" r="25" fill="#2196F3" stroke="#333" stroke-width="3"/>
  <circle cx="60" cy="280" r="20" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Back right wheel -->
  <circle cx="240" cy="280" r="25" fill="#2196F3" stroke="#333" stroke-width="3"/>
  <circle cx="240" cy="280" r="20" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- SPIKE Hub (center) -->
  <circle cx="150" cy="170" r="40" fill="#f0f0f0" stroke="#333" stroke-width="3"/>
  <rect x="135" y="155" width="30" height="30" fill="#2196F3" stroke="#333" stroke-width="2" rx="3"/>
  <text x="150" y="178" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">HUB</text>

  <!-- Front sensor (distance) -->
  <rect x="135" y="50" width="30" height="20" fill="#FF9800" stroke="#333" stroke-width="2" rx="3"/>
  <circle cx="150" cy="60" r="4" fill="#2196F3" stroke="#333" stroke-width="1"/>
  <text x="150" y="35" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">Sensor</text>

  <!-- Left motor connection indicator -->
  <line x1="110" y1="100" x2="60" y2="100" stroke="#666" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="85" y="85" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#666">Motor</text>

  <!-- Right motor connection indicator -->
  <line x1="190" y1="100" x2="240" y2="100" stroke="#666" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="215" y="85" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#666">Motor</text>

  <!-- Direction arrow (showing forward) -->
  <path d="M 150 45 L 145 55 L 150 52 L 155 55 Z" fill="#FF9800" stroke="none"/>
  <line x1="150" y1="45" x2="150" y2="20" stroke="#FF9800" stroke-width="2"/>

  <!-- Labels -->
  <text x="50" y="325" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Left Wheels</text>
  <text x="240" y="325" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="end" fill="#333">Right Wheels</text>

  <!-- Legend box -->
  <rect x="15" y="310" width="270" height="35" fill="#f0f0f0" stroke="#333" stroke-width="1" rx="3"/>
  <text x="25" y="328" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">This view shows the robot from above (top-down view)</text>
  <text x="25" y="342" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Wheels are on the sides, motors drive them via shafts from the hub</text>
</svg>
