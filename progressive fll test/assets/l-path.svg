<svg viewBox="0 0 350 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="350" height="350" fill="white"/>

  <!-- Title -->
  <text x="175" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">L-Shaped Path Movement</text>

  <!-- Grid background (light) -->
  <g stroke="#ddd" stroke-width="1">
    <line x1="50" y1="70" x2="50" y2="330" />
    <line x1="70" y1="70" x2="70" y2="330" />
    <line x1="90" y1="70" x2="90" y2="330" />
    <line x1="110" y1="70" x2="110" y2="330" />
    <line x1="130" y1="70" x2="130" y2="330" />
    <line x1="150" y1="70" x2="150" y2="330" />
    <line x1="170" y1="70" x2="170" y2="330" />
    <line x1="190" y1="70" x2="190" y2="330" />
    <line x1="210" y1="70" x2="210" y2="330" />
    <line x1="230" y1="70" x2="230" y2="330" />
    <line x1="250" y1="70" x2="250" y2="330" />
    <line x1="270" y1="70" x2="270" y2="330" />
    <line x1="290" y1="70" x2="290" y2="330" />
    <line x1="310" y1="70" x2="310" y2="330" />

    <line x1="50" y1="70" x2="330" y2="70" />
    <line x1="50" y1="90" x2="330" y2="90" />
    <line x1="50" y1="110" x2="330" y2="110" />
    <line x1="50" y1="130" x2="330" y2="130" />
    <line x1="50" y1="150" x2="330" y2="150" />
    <line x1="50" y1="170" x2="330" y2="170" />
    <line x1="50" y1="190" x2="330" y2="190" />
    <line x1="50" y1="210" x2="330" y2="210" />
    <line x1="50" y1="230" x2="330" y2="230" />
    <line x1="50" y1="250" x2="330" y2="250" />
    <line x1="50" y1="270" x2="330" y2="270" />
    <line x1="50" y1="290" x2="330" y2="290" />
    <line x1="50" y1="310" x2="330" y2="310" />
    <line x1="50" y1="330" x2="330" y2="330" />
  </g>

  <!-- Robot starting position -->
  <g>
    <rect x="40" y="305" width="20" height="20" fill="#2196F3" stroke="#333" stroke-width="2" rx="2"/>
    <circle cx="50" cy="310" r="3" fill="#FF9800"/>
    <text x="45" y="340" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">START</text>
  </g>

  <!-- Path marker definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF9800"/>
    </marker>
  </defs>

  <!-- First segment: Moving forward (straight up) -->
  <line x1="50" y1="305" x2="50" y2="120" stroke="#FF9800" stroke-width="4" marker-end="url(#arrowhead)"/>
  <text x="30" y="210" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FF9800">Forward</text>

  <!-- Corner point -->
  <circle cx="50" cy="120" r="8" fill="#4CAF50" stroke="#333" stroke-width="2"/>
  <text x="30" y="110" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4CAF50">Turn</text>
  <text x="30" y="125" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4CAF50">90°</text>

  <!-- Second segment: Moving right -->
  <line x1="50" y1="120" x2="280" y2="120" stroke="#2196F3" stroke-width="4" marker-end="url(#arrowhead)"/>
  <text x="160" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2196F3">Forward</text>

  <!-- End position -->
  <g>
    <rect x="270" y="110" width="20" height="20" fill="#4CAF50" stroke="#333" stroke-width="2" rx="2"/>
    <circle cx="280" cy="120" r="3" fill="#FF9800"/>
    <text x="280" y="155" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">END</text>
  </g>

  <!-- Instruction box -->
  <rect x="20" y="170" width="310" height="130" fill="#f0f0f0" stroke="#333" stroke-width="2" rx="5"/>
  <text x="30" y="195" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Robot Program:</text>
  <text x="40" y="220" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">1. Move forward 190 units</text>
  <text x="40" y="242" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">2. Turn right 90 degrees</text>
  <text x="40" y="264" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">3. Move forward 230 units</text>
  <text x="40" y="286" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Result: L-shaped path</text>
</svg>
