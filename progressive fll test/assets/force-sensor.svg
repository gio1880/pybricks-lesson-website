<svg viewBox="0 0 350 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="350" height="300" fill="white"/>

  <!-- Title -->
  <text x="175" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Force/Pressure Sensor</text>

  <!-- Force sensor body (front view) -->
  <g>
    <!-- Sensor housing -->
    <rect x="60" y="80" width="110" height="90" fill="#666" stroke="#333" stroke-width="3" rx="8"/>

    <!-- Pressure pad (top surface) -->
    <rect x="80" y="65" width="70" height="20" fill="#999" stroke="#333" stroke-width="2" rx="3"/>

    <!-- Pressure indicator lines -->
    <line x1="85" y1="75" x2="85" y2="60" stroke="#FF6B6B" stroke-width="2"/>
    <line x1="100" y1="75" x2="100" y2="55" stroke="#FF6B6B" stroke-width="2"/>
    <line x1="115" y1="75" x2="115" y2="58" stroke="#FF6B6B" stroke-width="2"/>
    <line x1="130" y1="75" x2="130" y2="52" stroke="#FF6B6B" stroke-width="2"/>

    <!-- Arrow showing applied force -->
    <line x1="115" y1="40" x2="115" y2="65" stroke="#FF9800" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="130" y="50" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF9800">Force</text>

    <!-- Pressure reading -->
    <text x="115" y="155" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Pressure</text>

    <!-- Port connection -->
    <rect x="85" y="180" width="60" height="18" fill="#FF9800" stroke="#333" stroke-width="2" rx="3"/>
  </g>

  <!-- Pressure level indicator (right side) -->
  <g>
    <!-- Gauge background -->
    <rect x="200" y="80" width="50" height="150" fill="#e0e0e0" stroke="#333" stroke-width="2" rx="4"/>

    <!-- Pressure bar (fills from bottom) -->
    <rect x="210" y="175" width="30" height="55" fill="#FF6B6B" stroke="none" rx="2"/>

    <!-- Scale markers -->
    <line x1="195" y1="100" x2="200" y2="100" stroke="#333" stroke-width="2"/>
    <line x1="195" y1="130" x2="200" y2="130" stroke="#333" stroke-width="2"/>
    <line x1="195" y1="160" x2="200" y2="160" stroke="#333" stroke-width="2"/>
    <line x1="195" y1="190" x2="200" y2="190" stroke="#333" stroke-width="2"/>
    <line x1="195" y1="220" x2="200" y2="220" stroke="#333" stroke-width="2"/>

    <!-- Scale labels -->
    <text x="185" y="105" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="end" fill="#333">Max</text>
    <text x="185" y="195" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="end" fill="#333">Mid</text>
    <text x="185" y="225" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="end" fill="#333">Min</text>

    <!-- Current value -->
    <text x="225" y="100" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">Now:</text>
    <text x="225" y="115" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#FF6B6B">65%</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF9800"/>
    </marker>
  </defs>

  <!-- Info box -->
  <rect x="20" y="260" width="310" height="35" fill="#f0f0f0" stroke="#333" stroke-width="2" rx="4"/>
  <text x="175" y="278" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Detects pushing force/pressure on the sensor pad</text>
  <text x="175" y="293" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#666">Used for detecting collisions or gripper pressure</text>
</svg>
