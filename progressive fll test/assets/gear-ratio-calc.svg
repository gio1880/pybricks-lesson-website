<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="white"/>

  <!-- Title -->
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Gear Ratio Calculation</text>

  <!-- Driver gear (small, 12T) -->
  <g>
    <circle cx="100" cy="120" r="35" fill="#2196F3" stroke="#333" stroke-width="3"/>
    <!-- Teeth -->
    <rect x="95" y="50" width="10" height="20" fill="#2196F3" stroke="#333" stroke-width="2"/>
    <rect x="95" y="150" width="10" height="20" fill="#2196F3" stroke="#333" stroke-width="2"/>
    <rect x="70" y="75" width="20" height="10" fill="#2196F3" stroke="#333" stroke-width="2"/>
    <rect x="120" y="75" width="20" height="10" fill="#2196F3" stroke="#333" stroke-width="2"/>
    <rect x="70" y="145" width="20" height="10" fill="#2196F3" stroke="#333" stroke-width="2"/>
    <rect x="120" y="145" width="20" height="10" fill="#2196F3" stroke="#333" stroke-width="2"/>
    <!-- Center hole -->
    <circle cx="100" cy="120" r="10" fill="white" stroke="#333" stroke-width="2"/>
    <!-- Rotation arrow -->
    <path d="M 70 85 A 30 30 0 0 0 95 55" fill="none" stroke="#FF9800" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="100" y="220" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Driver</text>
    <text x="100" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2196F3">12 Teeth</text>
  </g>

  <!-- Arrow between gears -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF9800"/>
    </marker>
  </defs>

  <line x1="150" y1="120" x2="200" y2="120" stroke="#666" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Driven gear (large, 36T) -->
  <g>
    <circle cx="300" cy="120" r="60" fill="#FF9800" stroke="#333" stroke-width="3"/>
    <!-- Teeth (simplified) -->
    <rect x="290" y="30" width="12" height="25" fill="#FF9800" stroke="#333" stroke-width="2"/>
    <rect x="290" y="165" width="12" height="25" fill="#FF9800" stroke="#333" stroke-width="2"/>
    <rect x="240" y="65" width="25" height="12" fill="#FF9800" stroke="#333" stroke-width="2"/>
    <rect x="175" y="65" width="25" height="12" fill="#FF9800" stroke="#333" stroke-width="2"/>
    <rect x="240" y="155" width="25" height="12" fill="#FF9800" stroke="#333" stroke-width="2"/>
    <rect x="175" y="155" width="25" height="12" fill="#FF9800" stroke="#333" stroke-width="2"/>
    <!-- Center hole -->
    <circle cx="300" cy="120" r="12" fill="white" stroke="#333" stroke-width="2"/>
    <!-- Rotation arrow (slower) -->
    <path d="M 255 85 A 50 50 0 0 0 295 55" fill="none" stroke="#FF9800" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="300" y="220" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Driven</text>
    <text x="300" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FF9800">36 Teeth</text>
  </g>

  <!-- Ratio calculation box -->
  <rect x="120" y="270" width="160" height="25" fill="#f0f0f0" stroke="#333" stroke-width="2" rx="4"/>
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Ratio: 36 ÷ 12 = 3:1</text>
</svg>
