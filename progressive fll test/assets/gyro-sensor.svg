<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="white"/>

  <!-- Center SPIKE hub -->
  <circle cx="200" cy="200" r="70" fill="#f0f0f0" stroke="#333" stroke-width="3"/>
  <rect x="175" y="175" width="50" height="50" fill="#2196F3" stroke="#333" stroke-width="2" rx="4"/>

  <!-- X-axis (red) -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF5252"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4CAF50"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2196F3"/>
    </marker>
  </defs>

  <!-- X-axis (left-right) -->
  <line x1="50" y1="200" x2="350" y2="200" stroke="#FF5252" stroke-width="4" marker-end="url(#arrowRed)"/>
  <text x="360" y="210" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF5252">X</text>

  <!-- Y-axis (up-down) -->
  <line x1="200" y1="50" x2="200" y2="350" stroke="#4CAF50" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <text x="210" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4CAF50">Y</text>

  <!-- Z-axis (diagonal coming out) -->
  <line x1="80" y1="80" x2="280" y2="280" stroke="#2196F3" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text x="290" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2196F3">Z</text>

  <!-- Rotation indicators (curved arrows) -->
  <!-- Roll (around X-axis) -->
  <path d="M 280 120 Q 320 150 300 190" fill="none" stroke="#FF5252" stroke-width="3" stroke-dasharray="3,3"/>
  <polygon points="300 190, 305 178, 312 188" fill="#FF5252"/>
  <text x="320" y="150" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FF5252">Roll</text>

  <!-- Pitch (around Y-axis) -->
  <path d="M 280 280 Q 250 320 210 300" fill="none" stroke="#4CAF50" stroke-width="3" stroke-dasharray="3,3"/>
  <polygon points="210 300, 218 308, 206 316" fill="#4CAF50"/>
  <text x="220" y="340" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4CAF50">Pitch</text>

  <!-- Yaw (around Z-axis) -->
  <path d="M 120 120 Q 80 200 120 280" fill="none" stroke="#2196F3" stroke-width="3" stroke-dasharray="3,3"/>
  <polygon points="120 280, 110 270, 122 262" fill="#2196F3"/>
  <text x="50" y="200" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2196F3">Yaw</text>

  <!-- Title -->
  <text x="200" y="380" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Gyro Sensor - 3-Axis Rotation</text>
</svg>
