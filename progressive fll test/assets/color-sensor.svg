<svg viewBox="0 0 350 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="350" height="300" fill="white"/>

  <!-- Sensor body -->
  <rect x="80" y="100" width="80" height="100" fill="#666" stroke="#333" stroke-width="3" rx="5"/>

  <!-- Sensor lens (front circle) -->
  <circle cx="120" cy="150" r="25" fill="#2196F3" stroke="#333" stroke-width="3"/>
  <circle cx="120" cy="150" r="20" fill="#e3f2fd" stroke="#333" stroke-width="1"/>

  <!-- Port connection -->
  <rect x="105" y="210" width="30" height="20" fill="#FF9800" stroke="#333" stroke-width="2" rx="3"/>

  <!-- Light beam arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF9800"/>
    </marker>
  </defs>

  <!-- Reflected light paths -->
  <line x1="145" y1="140" x2="220" y2="110" stroke="#FF9800" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="145" y1="150" x2="230" y2="150" stroke="#FF9800" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="145" y1="160" x2="220" y2="190" stroke="#FF9800" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Surface being sensed -->
  <rect x="220" y="100" width="80" height="100" fill="#4CAF50" stroke="#333" stroke-width="3" rx="5"/>

  <!-- Labels -->
  <text x="120" y="280" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Color/Light Sensor</text>
  <text x="260" y="220" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Reflected</text>
  <text x="260" y="238" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Light</text>
</svg>
