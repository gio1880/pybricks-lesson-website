<svg viewBox="0 0 450 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="450" height="250" fill="white"/>

  <!-- Title -->
  <text x="225" y="25" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#333">PID Control Loop</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FF9800"/>
    </marker>
  </defs>

  <!-- Target input -->
  <rect x="10" y="105" width="60" height="40" fill="#2196F3" stroke="#333" stroke-width="2" rx="4"/>
  <text x="40" y="131" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Target</text>

  <!-- Arrow to comparator -->
  <line x1="70" y1="125" x2="95" y2="125" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Comparator circle -->
  <circle cx="110" cy="125" r="15" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <text x="110" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">−</text>

  <!-- Error output -->
  <line x1="125" y1="125" x2="150" y2="125" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="137" y="115" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#666">Error</text>

  <!-- PID Controller box -->
  <rect x="150" y="100" width="80" height="50" fill="#FF9800" stroke="#333" stroke-width="2" rx="4"/>
  <text x="190" y="118" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">PID</text>
  <text x="190" y="132" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="white">Controller</text>

  <!-- Arrow to motor/output -->
  <line x1="230" y1="125" x2="255" y2="125" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Motor/Actuator -->
  <rect x="255" y="100" width="80" height="50" fill="#4CAF50" stroke="#333" stroke-width="2" rx="4"/>
  <text x="295" y="118" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Motor/</text>
  <text x="295" y="132" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle" fill="white">Robot</text>

  <!-- Arrow to feedback -->
  <line x1="295" y1="150" x2="295" y2="180" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Feedback sensor -->
  <rect x="255" y="180" width="80" height="40" fill="#2196F3" stroke="#333" stroke-width="2" rx="4"/>
  <text x="295" y="208" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Sensor</text>

  <!-- Feedback loop back to comparator -->
  <path d="M 255 200 Q 170 200 110 150" fill="none" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Actual/feedback label -->
  <text x="175" y="220" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#666">Feedback</text>

  <!-- Description box -->
  <rect x="10" y="50" width="185" height="40" fill="#f0f0f0" stroke="#333" stroke-width="1" rx="3"/>
  <text x="20" y="65" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">1. Compare target to actual</text>
  <text x="20" y="80" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">2. Adjust motor based on error</text>

  <!-- Formula note -->
  <rect x="245" y="50" width="185" height="40" fill="#f0f0f0" stroke="#333" stroke-width="1" rx="3"/>
  <text x="255" y="65" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Keeps robot on track:</text>
  <text x="255" y="80" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Automatic error correction</text>
</svg>
