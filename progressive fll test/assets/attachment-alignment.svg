<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="white"/>

  <!-- Title -->
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Attachment Alignment</text>

  <!-- Correct alignment (left side) -->
  <g>
    <!-- Rails -->
    <rect x="20" y="60" width="12" height="180" fill="#999" stroke="#333" stroke-width="2" rx="2"/>
    <rect x="108" y="60" width="12" height="180" fill="#999" stroke="#333" stroke-width="2" rx="2"/>

    <!-- Centered attachment -->
    <rect x="40" y="85" width="70" height="90" fill="#4CAF50" stroke="#333" stroke-width="3" rx="4"/>
    <text x="75" y="135" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">CORRECT</text>

    <!-- Alignment indicator -->
    <line x1="26" y1="70" x2="114" y2="70" stroke="#333" stroke-width="2"/>
    <circle cx="26" cy="70" r="4" fill="#333"/>
    <circle cx="114" cy="70" r="4" fill="#333"/>
    <line x1="70" y1="65" x2="70" y2="75" stroke="#333" stroke-width="2"/>

    <!-- Status -->
    <text x="75" y="265" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#4CAF50">✓ Aligned Properly</text>
    <text x="75" y="283" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#666">Keyed connector</text>
    <text x="75" y="298" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#666">holds position</text>
  </g>

  <!-- Incorrect alignment (right side) -->
  <g>
    <!-- Rails -->
    <rect x="220" y="60" width="12" height="180" fill="#999" stroke="#333" stroke-width="2" rx="2"/>
    <rect x="308" y="60" width="12" height="180" fill="#999" stroke="#333" stroke-width="2" rx="2"/>

    <!-- Off-center attachment -->
    <rect x="230" y="75" width="70" height="90" fill="#FF6B6B" stroke="#333" stroke-width="3" rx="4" opacity="0.8"/>
    <text x="265" y="125" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">WRONG</text>

    <!-- Misalignment indicator (off to the side) -->
    <line x1="226" y1="70" x2="314" y2="70" stroke="#333" stroke-width="2"/>
    <circle cx="226" cy="70" r="4" fill="#333"/>
    <circle cx="314" cy="70" r="4" fill="#333"/>
    <line x1="240" y1="65" x2="240" y2="75" stroke="#FF6B6B" stroke-width="2"/>

    <!-- Status -->
    <text x="265" y="265" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#FF6B6B">✗ Misaligned</text>
    <text x="265" y="283" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#666">Loose, can slip</text>
    <text x="265" y="298" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#666">out during movement</text>
  </g>
</svg>
