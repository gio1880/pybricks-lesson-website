<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="circuitLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#22D3EE;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="nodeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main circuit paths -->
  <!-- Top-left to center -->
  <path d="M 30 30 L 100 30 L 100 100" stroke="url(#circuitLine)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Top-right to center -->
  <path d="M 170 30 L 100 30" stroke="url(#circuitLine)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom-left to center -->
  <path d="M 30 170 L 100 170 L 100 100" stroke="url(#circuitLine)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom-right to center -->
  <path d="M 170 170 L 100 170" stroke="url(#circuitLine)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left to center -->
  <path d="M 30 100 L 100 100" stroke="url(#circuitLine)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right to center -->
  <path d="M 170 100 L 100 100" stroke="url(#circuitLine)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Diagonal paths -->
  <path d="M 40 40 L 70 70" stroke="#6366F1" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M 160 40 L 130 70" stroke="#22D3EE" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M 40 160 L 70 130" stroke="#22D3EE" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M 160 160 L 130 130" stroke="#6366F1" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>

  <!-- Node points -->
  <!-- Center node (largest, glowing) -->
  <circle cx="100" cy="100" r="6" fill="url(#nodeGlow)" opacity="0.9"/>
  <circle cx="100" cy="100" r="8" fill="none" stroke="#22D3EE" stroke-width="1" opacity="0.5"/>

  <!-- Corner nodes -->
  <circle cx="30" cy="30" r="4" fill="#6366F1"/>
  <circle cx="170" cy="30" r="4" fill="#22D3EE"/>
  <circle cx="30" cy="170" r="4" fill="#22D3EE"/>
  <circle cx="170" cy="170" r="4" fill="#6366F1"/>

  <!-- Cardinal direction nodes -->
  <circle cx="30" cy="100" r="4" fill="#6366F1"/>
  <circle cx="170" cy="100" r="4" fill="#22D3EE"/>
  <circle cx="100" cy="30" r="4" fill="#22D3EE"/>
  <circle cx="100" cy="170" r="4" fill="#6366F1"/>

  <!-- Secondary nodes on diagonal paths -->
  <circle cx="70" cy="70" r="3" fill="#6366F1" opacity="0.7"/>
  <circle cx="130" cy="70" r="3" fill="#22D3EE" opacity="0.7"/>
  <circle cx="70" cy="130" r="3" fill="#22D3EE" opacity="0.7"/>
  <circle cx="130" cy="130" r="3" fill="#6366F1" opacity="0.7"/>

  <!-- Subtle secondary grid lines -->
  <line x1="50" y1="50" x2="80" y2="80" stroke="#6366F1" stroke-width="0.5" opacity="0.3"/>
  <line x1="150" y1="50" x2="120" y2="80" stroke="#22D3EE" stroke-width="0.5" opacity="0.3"/>
  <line x1="50" y1="150" x2="80" y2="120" stroke="#22D3EE" stroke-width="0.5" opacity="0.3"/>
  <line x1="150" y1="150" x2="120" y2="120" stroke="#6366F1" stroke-width="0.5" opacity="0.3"/>
</svg>