<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="codeGradientIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="codeGradientCyan" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:0.05" />
    </linearGradient>
    <filter id="codeBlur">
      <feGaussianBlur stdDeviation="1.5" />
    </filter>
  </defs>

  <!-- Floating curly braces -->
  <g opacity="0.15" class="float">
    <text x="80" y="100" font-family="monospace" font-size="48" fill="#6366F1" font-weight="bold">{</text>
  </g>
  <g opacity="0.12" class="float">
    <text x="720" y="150" font-family="monospace" font-size="52" fill="#22D3EE" font-weight="bold">}</text>
  </g>
  <g opacity="0.14" class="float">
    <text x="150" y="450" font-family="monospace" font-size="44" fill="#22D3EE" font-weight="bold">{</text>
  </g>
  <g opacity="0.13" class="float">
    <text x="680" y="500" font-family="monospace" font-size="48" fill="#6366F1" font-weight="bold">}</text>
  </g>

  <!-- Floating angle brackets -->
  <g opacity="0.12" class="float">
    <text x="300" y="80" font-family="monospace" font-size="42" fill="#22D3EE" font-weight="bold">&lt;</text>
  </g>
  <g opacity="0.13" class="float">
    <text x="550" y="320" font-family="monospace" font-size="46" fill="#6366F1" font-weight="bold">&gt;</text>
  </g>
  <g opacity="0.11" class="float">
    <text x="120" y="280" font-family="monospace" font-size="40" fill="#6366F1" font-weight="bold">&lt;</text>
  </g>
  <g opacity="0.14" class="float">
    <text x="650" y="420" font-family="monospace" font-size="44" fill="#22D3EE" font-weight="bold">&gt;</text>
  </g>

  <!-- Assignment and operators -->
  <g opacity="0.13" class="float">
    <text x="250" y="200" font-family="monospace" font-size="38" fill="#6366F1" font-weight="bold">=</text>
  </g>
  <g opacity="0.12" class="float">
    <text x="500" y="450" font-family="monospace" font-size="36" fill="#22D3EE" font-weight="bold">+</text>
  </g>
  <g opacity="0.14" class="float">
    <text x="350" y="550" font-family="monospace" font-size="40" fill="#6366F1" font-weight="bold">=</text>
  </g>

  <!-- Comment symbols -->
  <g opacity="0.12" class="float">
    <text x="400" y="150" font-family="monospace" font-size="44" fill="#22D3EE" font-weight="bold">//</text>
  </g>
  <g opacity="0.13" class="float">
    <text x="200" y="380" font-family="monospace" font-size="42" fill="#6366F1" font-weight="bold">#</text>
  </g>
  <g opacity="0.11" class="float">
    <text x="600" y="250" font-family="monospace" font-size="40" fill="#22D3EE" font-weight="bold">//</text>
  </g>

  <!-- Circuit trace lines connecting dots -->
  <g stroke="#6366F1" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M 100 120 L 180 140 L 220 100" filter="url(#codeBlur)"/>
    <path d="M 380 200 L 420 240 L 450 220" filter="url(#codeBlur)"/>
    <path d="M 550 380 L 600 400 L 640 370" filter="url(#codeBlur)"/>
  </g>

  <!-- Cyan circuit traces -->
  <g stroke="#22D3EE" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M 280 280 L 340 300 L 380 280" filter="url(#codeBlur)"/>
    <path d="M 650 150 L 700 180 L 720 160" filter="url(#codeBlur)"/>
    <path d="M 120 450 L 160 480 L 200 460" filter="url(#codeBlur)"/>
  </g>

  <!-- Connected nodes/dots along traces -->
  <circle cx="100" cy="120" r="2.5" fill="#6366F1" opacity="0.3"/>
  <circle cx="180" cy="140" r="2" fill="#6366F1" opacity="0.25"/>
  <circle cx="220" cy="100" r="2.5" fill="#6366F1" opacity="0.3"/>

  <circle cx="380" cy="200" r="2" fill="#6366F1" opacity="0.25"/>
  <circle cx="420" cy="240" r="2.5" fill="#6366F1" opacity="0.3"/>
  <circle cx="450" cy="220" r="2" fill="#6366F1" opacity="0.25"/>

  <circle cx="550" cy="380" r="2" fill="#6366F1" opacity="0.25"/>
  <circle cx="600" cy="400" r="2.5" fill="#6366F1" opacity="0.3"/>
  <circle cx="640" cy="370" r="2" fill="#6366F1" opacity="0.25"/>

  <!-- Cyan dots -->
  <circle cx="280" cy="280" r="2" fill="#22D3EE" opacity="0.25"/>
  <circle cx="340" cy="300" r="2.5" fill="#22D3EE" opacity="0.3"/>
  <circle cx="380" cy="280" r="2" fill="#22D3EE" opacity="0.25"/>

  <circle cx="650" cy="150" r="2.5" fill="#22D3EE" opacity="0.3"/>
  <circle cx="700" cy="180" r="2" fill="#22D3EE" opacity="0.25"/>
  <circle cx="720" cy="160" r="2" fill="#22D3EE" opacity="0.25"/>

  <circle cx="120" cy="450" r="2" fill="#22D3EE" opacity="0.25"/>
  <circle cx="160" cy="480" r="2.5" fill="#22D3EE" opacity="0.3"/>
  <circle cx="200" cy="460" r="2" fill="#22D3EE" opacity="0.25"/>

  <!-- Random floating dots network -->
  <g opacity="0.15">
    <circle cx="50" cy="50" r="1.5" fill="#6366F1"/>
    <circle cx="150" cy="90" r="1.5" fill="#22D3EE"/>
    <circle cx="320" cy="120" r="1.5" fill="#6366F1"/>
    <circle cx="480" cy="95" r="1.5" fill="#22D3EE"/>
    <circle cx="620" cy="140" r="1.5" fill="#6366F1"/>
    <circle cx="750" cy="80" r="1.5" fill="#22D3EE"/>

    <circle cx="90" cy="280" r="1.5" fill="#22D3EE"/>
    <circle cx="280" cy="340" r="1.5" fill="#6366F1"/>
    <circle cx="420" cy="380" r="1.5" fill="#22D3EE"/>
    <circle cx="580" cy="310" r="1.5" fill="#6366F1"/>
    <circle cx="730" cy="350" r="1.5" fill="#22D3EE"/>

    <circle cx="160" cy="520" r="1.5" fill="#6366F1"/>
    <circle cx="350" cy="560" r="1.5" fill="#22D3EE"/>
    <circle cx="520" cy="530" r="1.5" fill="#6366F1"/>
    <circle cx="680" cy="550" r="1.5" fill="#22D3EE"/>
  </g>

  <!-- Subtle gradient overlays for depth -->
  <rect x="0" y="0" width="800" height="600" fill="url(#codeGradientIndigo)"/>
  <rect x="0" y="0" width="800" height="600" fill="url(#codeGradientCyan)"/>
</svg>